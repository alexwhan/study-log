<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2B4ECF">
<title>Study Log</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
:root{
  --paper:#F2F4F6;
  --card:#FFFFFF;
  --line:#D5DCE4;
  --line-soft:#E4E9EF;
  --ink:#1C2833;
  --muted:#5C6B7A;
  --biro:#2B4ECF;
  --biro-deep:#1F3BA6;
  --biro-wash:#E8EDFB;
  --low:#BF3B2B;
  --med:#B07C1E;
  --high:#2E7D5B;
  --margin-rule:rgba(191,59,43,.28);
  --mono:ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  --sans:system-ui,Roboto,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding:0 16px calc(40px + env(safe-area-inset-bottom)) 16px;
}
/* exercise-book margin rule */
body::before{
  content:"";
  position:fixed;
  top:0;bottom:0;left:9px;
  width:1.5px;
  background:var(--margin-rule);
  pointer-events:none;
  z-index:0;
}
#app{max-width:560px;margin:0 auto;position:relative;z-index:1}

/* ---------- masthead ---------- */
header{padding:calc(18px + env(safe-area-inset-top)) 0 14px 0;display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--biro);font-weight:600}
h1{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:-.01em;margin-top:4px}
.streak{
  text-align:right;font-family:var(--mono);
  border:1px solid var(--line);background:var(--card);
  border-radius:10px;padding:8px 12px;min-width:88px;
}
.streak b{font-size:22px;color:var(--biro);display:block;line-height:1.1}
.streak span{font-size:10px;letter-spacing:.12em;color:var(--muted)}
.streak.plus b::after{content:" +";color:var(--high);font-size:14px;vertical-align:top}

/* ---------- shared ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.section-label{
  font-family:var(--mono);font-size:11px;letter-spacing:.16em;
  color:var(--muted);margin:22px 0 8px 2px;font-weight:600;
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
input,select{font:inherit;color:var(--ink)}
input:focus-visible,button:focus-visible,select:focus-visible,summary:focus-visible{outline:2px solid var(--biro);outline-offset:2px;border-radius:4px}

/* ---------- banners ---------- */
.banner{border-radius:10px;padding:10px 14px;font-size:14px;margin:10px 0;border:1px solid}
.banner.err{background:#FBEDEA;border-color:#E8C2BB;color:var(--low)}
.banner.ok{background:#EAF4EF;border-color:#C4DED2;color:var(--high)}
.banner button{text-decoration:underline;font-weight:600;padding:0;margin-left:6px}

/* ---------- today's subjects ---------- */
.subject{border-top:1px solid var(--line-soft)}
.subject:first-child{border-top:none}
.subject-head{
  width:100%;display:flex;align-items:center;gap:12px;
  padding:15px 14px;text-align:left;font-size:16px;font-weight:600;
}
.subject-head .tick{
  width:22px;height:22px;flex:none;border:1.5px solid var(--line);
  border-radius:6px;display:grid;place-items:center;
  font-family:var(--mono);font-size:13px;color:transparent;transition:all .15s;
}
.subject.done .subject-head .tick{background:var(--biro);border-color:var(--biro);color:#fff}
.subject.done .subject-head{color:var(--muted)}
.subject-head .hint{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em}
.subject.open .subject-head .hint{display:none}

/* ---------- editor (ruled lines) ---------- */
.editor{padding:2px 14px 16px 14px;display:none}
.subject.open .editor,.editor.always{display:block}
.row{display:flex;align-items:center;gap:10px;padding:2px 0}
.row input[type=text]{
  flex:1;border:none;border-bottom:1px solid var(--line);
  background:transparent;padding:9px 2px;font-size:15px;min-width:0;
}
.row input[type=text]::placeholder{color:#A6B2BE}
.row input[type=text]:focus{border-bottom-color:var(--biro);outline:none}
.seg{display:flex;flex:none;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{
  font-family:var(--mono);font-size:12px;font-weight:700;
  padding:7px 9px;color:var(--muted);border-left:1px solid var(--line);
}
.seg button:first-child{border-left:none}
.seg button[aria-pressed=true]{color:#fff}
.seg button[data-v=low][aria-pressed=true]{background:var(--low)}
.seg button[data-v=med][aria-pressed=true]{background:var(--med)}
.seg button[data-v=high][aria-pressed=true]{background:var(--high)}
.editor-actions{display:flex;gap:10px;margin-top:14px;align-items:center}
.btn{
  font-weight:700;font-size:15px;border-radius:10px;padding:11px 18px;
  background:var(--biro);color:#fff;transition:background .15s;
}
.btn:active{background:var(--biro-deep)}
.btn[disabled]{opacity:.55;cursor:default}
.btn.ghost{background:none;color:var(--muted);font-weight:600;padding:11px 8px}
.empty-note{padding:18px 14px;color:var(--muted);font-size:14px}

/* ---------- catch-up ---------- */
details.catchup{margin-top:10px}
details.catchup summary{
  list-style:none;cursor:pointer;font-size:13px;color:var(--muted);
  padding:8px 2px;font-weight:600;
}
details.catchup summary::before{content:"+ ";font-family:var(--mono);color:var(--biro)}
details.catchup[open] summary::before{content:"− "}
.catchup-controls{display:flex;gap:10px;padding:10px 14px 0 14px;flex-wrap:wrap}
.catchup-controls select,.catchup-controls input[type=date]{
  border:1px solid var(--line);border-radius:8px;padding:8px 10px;
  background:var(--card);font-size:14px;flex:1;min-width:130px;
}

/* ---------- ledger grid ---------- */
.ledger{padding:12px 10px 14px 14px;overflow-x:auto}
.ledger table{border-collapse:collapse;width:100%}
.ledger th{
  font-family:var(--mono);font-weight:600;font-size:10px;color:var(--muted);
  padding:0 0 8px 0;text-align:center;letter-spacing:.04em;white-space:pre-line;line-height:1.5;
}
.ledger th.subj,.ledger td.subj{
  text-align:left;font-family:var(--sans);font-size:12.5px;font-weight:600;
  color:var(--ink);padding-right:10px;max-width:118px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ledger td{border-top:1px solid var(--line-soft);text-align:center;padding:0;height:34px}
.cell{width:20px;height:20px;border-radius:5px;display:inline-block;vertical-align:middle}
.cell.logged{background:var(--biro)}
.cell.expected{border:1.5px dashed var(--line);background:transparent}
.cell.extra{background:var(--biro-wash);border:1.5px solid var(--biro-wash)}
.cell.off{width:5px;height:5px;border-radius:50%;background:var(--line)}
.ledger .today-col{background:var(--biro-wash)}
.legend{display:flex;gap:16px;padding:10px 2px 0 2px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:6px}

/* ---------- setup ---------- */
.setup{padding:18px 16px}
.setup h2{font-family:var(--mono);font-size:17px;margin-bottom:4px}
.setup p{font-size:13.5px;color:var(--muted);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input{
  width:100%;border:1px solid var(--line);border-radius:8px;
  padding:11px 12px;font-size:15px;background:var(--card);
}
.field input:focus{border-color:var(--biro);outline:none}
.setup .status{font-size:13.5px;margin-top:10px;min-height:1.4em}
.setup .status.err{color:var(--low)}
footer{margin-top:34px;text-align:center}
footer button{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--muted);text-decoration:underline}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="eyebrow">STUDY LOG</div>
      <h1 id="dateLine"></h1>
    </div>
    <div class="streak" id="streakBox" hidden>
      <b id="streakNum">0</b><span>DAY STREAK</span>
    </div>
  </header>
  <div id="banner"></div>
  <main id="main"></main>
  <footer><button id="settingsBtn" hidden>SETTINGS</button></footer>
</div>

<script>
"use strict";
/* ================= constants & state ================= */
const LS_CFG = "studylog.config";
const LS_TT  = "studylog.timetable";
const API    = "https://api.github.com";
const DAYKEYS = ["sun","mon","tue","wed","thu","fri","sat"];
const RATINGS = { low:"low", med:"med", high:"high" };

let cfg = null;          // {profile, repo, token}
let timetable = null;    // {week:{mon:[...]}, holidays:[...]}
let logMap = {};         // { "2026-07-21": Set(subjects) }
let fileSha = null;      // sha of current semester file (null if absent)

/* ================= date helpers ================= */
const pad = n => String(n).padStart(2,"0");
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayIso = () => iso(new Date());
function fmtHeader(d){
  return d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
}
function semesterPath(){
  const d = new Date();
  const s = d.getMonth()+1 >= 7 ? 2 : 1;
  return `${cfg.profile}/${d.getFullYear()}-S${s}.md`;
}
function isSchoolDay(d){
  const wd = d.getDay();
  if (wd === 0 || wd === 6) return false;
  const hols = (timetable && timetable.holidays) || [];
  return !hols.includes(iso(d));
}
function lastSchoolDays(n){
  const out = [];
  const d = new Date();
  let guard = 0;
  while (out.length < n && guard++ < 400){
    if (isSchoolDay(d)) out.push(iso(d));
    d.setDate(d.getDate()-1);
  }
  return out.reverse();
}
function subjectsFor(dateStr){
  if (!timetable) return [];
  const d = new Date(dateStr + "T12:00:00");
  return timetable.week[DAYKEYS[d.getDay()]] || [];
}
function allSubjects(){
  const seen = [];
  for (const k of ["mon","tue","wed","thu","fri"])
    for (const s of (timetable.week[k] || []))
      if (!seen.includes(s)) seen.push(s);
  return seen;
}

/* ================= base64 utf-8 ================= */
function b64encode(str){
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  for (let i = 0; i < bytes.length; i += 0x8000)
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  return btoa(bin);
}
function b64decode(b64){
  const bin = atob(b64.replace(/\s/g,""));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

/* ================= GitHub API ================= */
class AuthError extends Error {}
function ghHeaders(){
  return {
    "Authorization": "Bearer " + cfg.token,
    "Accept": "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28"
  };
}
async function ghGet(path){
  const r = await fetch(`${API}/repos/${cfg.repo}/contents/${path}`, { headers: ghHeaders() });
  if (r.status === 404) return null;
  if (r.status === 401 || r.status === 403) throw new AuthError();
  if (!r.ok) throw new Error("GitHub read failed (" + r.status + ")");
  const j = await r.json();
  return { text: b64decode(j.content), sha: j.sha };
}
async function ghPut(path, text, sha, message){
  const body = { message, content: b64encode(text) };
  if (sha) body.sha = sha;
  const r = await fetch(`${API}/repos/${cfg.repo}/contents/${path}`, {
    method: "PUT", headers: ghHeaders(), body: JSON.stringify(body)
  });
  if (r.status === 401 || r.status === 403) throw new AuthError();
  if (r.status === 409) return false;           // sha conflict — caller retries
  if (!r.ok) throw new Error("GitHub write failed (" + r.status + ")");
  const j = await r.json();
  fileSha = j.content.sha;
  return true;
}

/* ================= log file parse / build ================= */
function parseLog(text){
  const map = {};
  let cur = null;
  for (const line of text.split("\n")){
    let m = line.match(/^## (\d{4}-\d{2}-\d{2})/);
    if (m){ cur = m[1]; if (!map[cur]) map[cur] = new Set(); continue; }
    m = line.match(/^### (.+)/);
    if (m && cur) map[cur].add(m[1].trim());
  }
  return map;
}
function buildBlock(subject, items){
  const lines = items.map(it => `- ${it.text} — **${it.rating}**`);
  return `### ${subject}\n\n${lines.join("\n")}\n`;
}
function insertEntry(text, dateStr, block){
  if (!text) text = `# Study log — ${cfg.profile}\n`;
  const headRe = new RegExp(`^## ${dateStr}\\s*$`, "m");
  const m = text.match(headRe);
  if (m){
    // insert at end of this date's section (before next "## " or EOF)
    const after = text.slice(m.index + m[0].length);
    const next = after.search(/^## /m);
    const insertAt = next === -1 ? text.length : m.index + m[0].length + next;
    const before = text.slice(0, insertAt).replace(/\n*$/,"\n\n");
    return before + block + "\n" + text.slice(insertAt);
  }
  return text.replace(/\n*$/,"\n\n") + `## ${dateStr}\n\n` + block;
}

/* ================= sync ================= */
async function loadTimetable(force){
  const cached = JSON.parse(localStorage.getItem(LS_TT) || "null");
  const fresh = cached && (Date.now() - cached.at < 24*3600*1000);
  if (cached && fresh && !force){ timetable = cached.data; return; }
  try {
    const f = await ghGet(`${cfg.profile}/timetable.json`);
    if (!f) throw new Error("timetable missing");
    timetable = JSON.parse(f.text);
    localStorage.setItem(LS_TT, JSON.stringify({ at: Date.now(), data: timetable }));
  } catch (e){
    if (e instanceof AuthError) throw e;
    if (cached){ timetable = cached.data; return; }   // offline fallback
    throw e;
  }
}
async function loadLog(){
  const f = await ghGet(semesterPath());
  if (f){ logMap = parseLog(f.text); fileSha = f.sha; }
  else  { logMap = {}; fileSha = null; }
}
async function saveEntry(dateStr, subject, items){
  const block = buildBlock(subject, items);
  for (let attempt = 0; attempt < 2; attempt++){
    const f = await ghGet(semesterPath());
    const text = f ? f.text : "";
    const sha  = f ? f.sha  : null;
    const ok = await ghPut(
      semesterPath(),
      insertEntry(text, dateStr, block),
      sha,
      `${cfg.profile}: ${subject} ${dateStr}`
    );
    if (ok) return;
  }
  throw new Error("Couldn't save after retry — try again");
}

/* ================= streak ================= */
function computeStreak(){
  let count = 0, loggedToday = false;
  const d = new Date();
  let first = true, guard = 0;
  while (guard++ < 500){
    if (isSchoolDay(d)){
      const has = logMap[iso(d)] && logMap[iso(d)].size > 0;
      if (has){ count++; if (first && iso(d) === todayIso()) loggedToday = true; }
      else if (first && iso(d) === todayIso()){ /* today pending — don't break */ }
      else break;
      first = false;
    }
    d.setDate(d.getDate()-1);
  }
  return { count, loggedToday };
}

/* ================= UI helpers ================= */
const $ = sel => document.querySelector(sel);
function el(tag, attrs = {}, ...children){
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)){
    if (k === "class") n.className = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined) n.setAttribute(k, v);
  }
  for (const c of children) n.append(c);
  return n;
}
function banner(kind, msg, action){
  const b = $("#banner");
  b.innerHTML = "";
  if (!msg) return;
  const div = el("div", { class: "banner " + kind }, msg);
  if (action) div.append(action);
  b.append(div);
}
function authBanner(){
  banner("err", "Access token expired or not accepted. ",
    el("button", { onclick: () => showSetup() }, "Open settings"));
}

/* ================= editor component ================= */
function makeEditor(getDate, subject, onSaved){
  const rows = el("div");
  const wrap = el("div", { class: "editor" });

  function addRow(){
    const seg = el("div", { class: "seg" });
    let rating = "med";
    for (const [v, label] of [["low","L"],["med","M"],["high","H"]]){
      const b = el("button", {
        type: "button", "data-v": v, "aria-pressed": v === "med" ? "true" : "false",
        "aria-label": v + " understanding",
        onclick: () => {
          rating = v;
          seg.querySelectorAll("button").forEach(x =>
            x.setAttribute("aria-pressed", x.dataset.v === v ? "true" : "false"));
        }
      }, label);
      seg.append(b);
    }
    const input = el("input", {
      type: "text", placeholder: "concept covered…", enterkeyhint: "next",
      oninput: () => { if (row === rows.lastElementChild && input.value.trim()) addRow(); }
    });
    const row = el("div", { class: "row" }, input, seg);
    row._get = () => ({ text: input.value.trim(), rating });
    rows.append(row);
  }
  addRow();

  const saveBtn = el("button", { class: "btn", type: "button" }, `Log ${subject}`);
  saveBtn.addEventListener("click", async () => {
    const items = [...rows.children].map(r => r._get()).filter(i => i.text);
    if (!items.length){ banner("err", "Add at least one concept first."); return; }
    saveBtn.disabled = true;
    saveBtn.innerHTML = "";
    saveBtn.append(el("span", { class: "spin" }), "Saving…");
    try {
      await saveEntry(getDate(), subject, items);
      banner("ok", `${subject} logged.`);
      await loadLog();
      onSaved();
    } catch (e){
      if (e instanceof AuthError) authBanner();
      else banner("err", e.message || "Save failed — check your connection.");
      saveBtn.disabled = false;
      saveBtn.textContent = `Log ${subject}`;
    }
  });

  wrap.append(rows, el("div", { class: "editor-actions" }, saveBtn));
  return wrap;
}

/* ================= main view ================= */
function renderMain(){
  const main = $("#main");
  main.innerHTML = "";
  $("#settingsBtn").hidden = false;

  /* streak */
  const s = computeStreak();
  const box = $("#streakBox");
  box.hidden = false;
  $("#streakNum").textContent = s.count;
  box.classList.toggle("plus", s.loggedToday);
  box.title = s.loggedToday ? "Includes today" : "Log today to keep it going";

  /* today */
  main.append(el("div", { class: "section-label" }, "TODAY"));
  const todayCard = el("div", { class: "card" });
  const subs = subjectsFor(todayIso());
  const doneToday = logMap[todayIso()] || new Set();

  if (!subs.length){
    todayCard.append(el("div", { class: "empty-note" },
      "No classes today. Use the catch-up entry below if you want to log something."));
  }
  for (const subject of subs){
    const row = el("div", { class: "subject" + (doneToday.has(subject) ? " done" : "") });
    const editor = makeEditor(() => todayIso(), subject, renderMain);
    const head = el("button", { class: "subject-head", type: "button",
      onclick: () => {
        const open = row.classList.toggle("open");
        if (open) row.querySelector("input[type=text]").focus();
      }},
      el("span", { class: "tick" }, "✓"),
      subject,
      el("span", { class: "hint" }, doneToday.has(subject) ? "logged" : "tap to log")
    );
    row.append(head, editor);
    todayCard.append(row);
  }
  main.append(todayCard);

  /* catch-up */
  const det = el("details", { class: "catchup" });
  det.append(el("summary", {}, "Log another day or subject"));
  const cu = el("div", { class: "card" });
  const dateIn = el("input", { type: "date", value: todayIso(), max: todayIso() });
  const sel = el("select");
  for (const sub of allSubjects()) sel.append(el("option", { value: sub }, sub));
  const cuEditorHolder = el("div");
  function mountCuEditor(){
    cuEditorHolder.innerHTML = "";
    const ed = makeEditor(() => dateIn.value, sel.value, renderMain);
    ed.classList.add("always");
    cuEditorHolder.append(ed);
  }
  sel.addEventListener("change", mountCuEditor);
  mountCuEditor();
  cu.append(el("div", { class: "catchup-controls" }, dateIn, sel), cuEditorHolder);
  det.append(cu);
  main.append(det);

  /* ledger */
  main.append(el("div", { class: "section-label" }, "LAST 10 SCHOOL DAYS"));
  const ledger = el("div", { class: "card" });
  const scroller = el("div", { class: "ledger" });
  const days = lastSchoolDays(10);
  const table = el("table");
  const headRow = el("tr", {}, el("th", { class: "subj" }, ""));
  for (const day of days){
    const d = new Date(day + "T12:00:00");
    const th = el("th", {}, "SMTWTFS"[d.getDay()] + "\n" + pad(d.getDate()));
    if (day === todayIso()) th.classList.add("today-col");
    headRow.append(th);
  }
  table.append(headRow);
  for (const subject of allSubjects()){
    const tr = el("tr", {}, el("td", { class: "subj" }, subject));
    for (const day of days){
      const expected = subjectsFor(day).includes(subject);
      const logged = logMap[day] && logMap[day].has(subject);
      let cls = "off";
      if (logged) cls = expected ? "logged" : "extra";
      else if (expected) cls = "expected";
      const td = el("td", {}, el("span", { class: "cell " + cls }));
      if (day === todayIso()) td.classList.add("today-col");
      tr.append(td);
    }
    table.append(tr);
  }
  scroller.append(table);
  ledger.append(scroller);
  main.append(ledger);
  main.append(el("div", { class: "legend" },
    el("span", {}, el("i", { class: "cell logged" }), " logged"),
    el("span", {}, el("i", { class: "cell expected" }), " missed"),
    el("span", {}, el("i", { class: "cell off" }), " no class")
  ));
}

/* ================= setup view ================= */
function showSetup(){
  const main = $("#main");
  main.innerHTML = "";
  $("#banner").innerHTML = "";
  $("#streakBox").hidden = true;
  $("#settingsBtn").hidden = true;

  const profile = el("input", { autocapitalize: "none", autocomplete: "off",
    value: cfg ? cfg.profile : "", placeholder: "e.g. hugo" });
  const repo = el("input", { autocapitalize: "none", autocomplete: "off",
    value: cfg ? cfg.repo : "alexwhan/study-log-notes" });
  const token = el("input", { type: "password", autocomplete: "off",
    value: cfg ? cfg.token : "", placeholder: "github_pat_…" });
  const status = el("div", { class: "status" });
  const save = el("button", { class: "btn", type: "button" }, "Save & connect");

  save.addEventListener("click", async () => {
    const trial = {
      profile: profile.value.trim().toLowerCase(),
      repo: repo.value.trim(),
      token: token.value.trim()
    };
    if (!trial.profile || !trial.repo || !trial.token){
      status.className = "status err"; status.textContent = "All three fields are needed."; return;
    }
    save.disabled = true;
    status.className = "status"; status.textContent = "Checking…";
    const prev = cfg;
    cfg = trial;
    try {
      localStorage.removeItem(LS_TT);
      await loadTimetable(true);
      localStorage.setItem(LS_CFG, JSON.stringify(cfg));
      await loadLog();
      renderMain();
    } catch (e){
      cfg = prev;
      status.className = "status err";
      status.textContent = e instanceof AuthError
        ? "Token not accepted — check it was copied fully and hasn't expired."
        : `Couldn't find ${trial.profile}/timetable.json in ${trial.repo}.`;
      save.disabled = false;
    }
  });

  const card = el("div", { class: "card setup" },
    el("h2", {}, "Set up this device"),
    el("p", {}, "Ask Dad for the access token. This only needs doing once."),
    el("div", { class: "field" }, el("label", {}, "NAME"), profile),
    el("div", { class: "field" }, el("label", {}, "NOTES REPO"), repo),
    el("div", { class: "field" }, el("label", {}, "ACCESS TOKEN"), token),
    save, status
  );
  main.append(card);
}

/* ================= boot ================= */
async function boot(){
  $("#dateLine").textContent = fmtHeader(new Date());
  $("#settingsBtn").addEventListener("click", showSetup);
  cfg = JSON.parse(localStorage.getItem(LS_CFG) || "null");
  if (!cfg){ showSetup(); return; }
  try {
    await loadTimetable(false);
    await loadLog();
    renderMain();
  } catch (e){
    if (e instanceof AuthError){
      $("#settingsBtn").hidden = false;
      authBanner();
    } else {
      banner("err", "Couldn't reach GitHub — check your connection. ",
        el("button", { onclick: () => location.reload() }, "Retry"));
      $("#settingsBtn").hidden = false;
    }
  }
}
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
boot();
</script>
